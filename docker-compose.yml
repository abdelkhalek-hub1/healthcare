# ====================================================================
# Healthcare AI Router — Docker Compose
# Full-stack orchestration: MongoDB + Backend + Frontend
# ====================================================================

services:
  # ── MongoDB ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: healthcare_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-healthcare_ai}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - healthcare_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: healthcare_backend
    restart: unless-stopped
    environment:
      # App
      APP_NAME: "Healthcare AI Router"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # MongoDB
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB_NAME:-healthcare_ai}?authSource=admin
      MONGO_DB_NAME: ${MONGO_DB_NAME:-healthcare_ai}
      # Groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-0.3}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-2048}
      GROQ_MAX_RETRIES: ${GROQ_MAX_RETRIES:-3}
      GROQ_TIMEOUT: ${GROQ_TIMEOUT:-30}
      # LangSmith (optional)
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-healthcare-ai-router}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - healthcare_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - backend_logs:/app/logs

  # ── React Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: healthcare_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - healthcare_net

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────
networks:
  healthcare_net:
    driver: bridge
